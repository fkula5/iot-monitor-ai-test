name: CI Pipeline

on:
  push:
    branches: [ "main", "feat/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    name: Backend Lint & Test (Go)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
        cache-dependency-path: backend/**/go.sum

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        working-directory: backend/device-service
        args: --timeout=5m

    - name: Test device-service
      run: |
        cd backend/device-service
        go mod tidy
        go test -v ./...

  frontend-test:
    name: Frontend Lint & Test (React)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Setup oxlint
      uses: oxc-project/setup-oxlint@v1

    - name: Lint (oxlint)
      run: |
        cd frontend
        oxlint

    - name: Test (Vitest)
      run: |
        cd frontend
        npm run test
